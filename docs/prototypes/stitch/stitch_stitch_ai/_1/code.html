<div class="mb-8 inline-flex items-center justify-center w-12 h-12 rounded-lg bg-primary text-on-primary shadow-sm">
<span class="material-symbols-outlined text-[28px]" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<h1 class="font-display-lg text-display-lg text-on-surface mb-4 tracking-tight">
                客服机器人
            </h1>

                知识库驱动的人机协作客服台
            </p>
<div class="flex flex-wrap gap-3 mt-10">
<span class="inline-flex items-center px-3 py-1.5 rounded bg-surface-variant/80 border border-outline-variant/50 backdrop-blur-sm font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] mr-1.5 opacity-70">receipt_long</span>
                    工单处理
                </span>
<span class="inline-flex items-center px-3 py-1.5 rounded bg-surface-variant/80 border border-outline-variant/50 backdrop-blur-sm font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] mr-1.5 opacity-70">auto_awesome</span>
                    AI 辅助回答
                </span>
<span class="inline-flex items-center px-3 py-1.5 rounded bg-surface-variant/80 border border-outline-variant/50 backdrop-blur-sm font-label-md text-label-md text-on-surface-variant">
<span class="material-symbols-outlined text-[16px] mr-1.5 opacity-70">library_books</span>
                    知识库检索
                </span>
</div>
</div>
<div class="relative z-10 p-12 lg:p-16 pt-0 mt-auto">
<p class="font-mono-sm text-mono-sm text-on-surface-variant/60">

            </p>
</div>
</div>
<div class="w-full lg:w-[55%] xl:w-[50%] flex flex-col justify-center items-center px-6 sm:px-12 relative">
<div class="w-full max-w-[360px]">
<div class="mb-10 text-center lg:text-left">
<div class="inline-flex lg:hidden items-center justify-center w-10 h-10 rounded bg-primary text-on-primary mb-6">
<span class="material-symbols-outlined text-[24px]" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<h2 class="font-headline-md text-headline-md text-on-surface">系统登录</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">请输入您的操作凭据以继续</p>
</div>
<form class="space-y-5" onsubmit="event.preventDefault(); document.getElementById('error-msg').classList.remove('hidden');">
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="username">登录名</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[18px] text-outline">person</span>
</span>
<input autocomplete="username" class="block w-full h-[36px] pl-9 pr-3 py-2 bg-surface border border-outline-variant rounded appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-shadow font-body-md text-body-md text-on-surface placeholder:text-outline/60" id="username" name="username" placeholder="请输入..." required="" type="text"/>
</div>
</div>
<div class="space-y-1.5">
<label class="block font-label-md text-label-md text-on-surface" for="password">密码</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-[18px] text-outline">lock</span>
</span>
<input autocomplete="current-password" class="block w-full h-[36px] pl-9 pr-3 py-2 bg-surface border border-outline-variant rounded appearance-none focus:outline-none focus:border-primary focus:ring-2 focus:ring-primary/10 transition-shadow font-body-md text-body-md text-on-surface placeholder:text-outline/60" id="password" name="password" placeholder="请输入..." required="" type="password"/>
</div>
</div>
<div class="hidden flex items-center gap-1.5 p-2 rounded bg-error-container/50 border border-error/20" id="error-msg">
<span class="material-symbols-outlined text-[16px] text-error">error</span>
<p class="font-body-sm text-body-sm text-error m-0">账号或密码错误</p>
</div>
<div class="pt-2">
<button class="w-full h-[36px] flex items-center justify-center gap-2 bg-primary text-on-primary rounded font-label-md text-label-md hover:bg-surface-tint transition-colors focus:outline-none focus:ring-2 focus:ring-primary/20 active:bg-primary-fixed-variant" type="submit">
<span>登录</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
</div>
</div>
