[tool.ruff]
target-version = "py312"
line-length = 100
src = ["backend/src", "backend/tests"]
exclude = [
  ".git",
  ".venv",
  "frontend",
  "pycore",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
  "B008",  # FastAPI Depends is intentionally declared in argument defaults.
  "UP046", # Pydantic generic models are clearer with the current Generic syntax.
]

[tool.mypy]
python_version = "3.12"
mypy_path = ["backend", "."]
files = ["backend/src", "backend/tests"]
exclude = ["^pycore/", "^frontend/"]
follow_imports = "skip"
ignore_missing_imports = true
disallow_untyped_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["backend/tests"]
pythonpath = [".", "backend"]
addopts = "-q"
